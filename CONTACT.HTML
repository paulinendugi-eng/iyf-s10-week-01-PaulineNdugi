<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>
    <h1>Contact Us</h1>
    <form action="# method="post">
        <fieldset>
            <legend>Personal Information</legend>

            <label for="paulinendugi">Pauline Ndugi:</label>
            <input type="text" id="paulinendugi" name="paulinendugi" placeholder="Pauline Ndugi">
            <br><br>
            
            <label for="paulinendugi@gmail.com"PaulineNdugi@gmail.com:</label>
            <input type="paulinendugi@gmail.com" id="paulinendugi@gmail.com" name="paulinendugi@gmail.com" placeholder="paulinendugi"
            <br><br>

            <label for="phone">Phone (optional):</label>    
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
            <br><br>

        </fieldset>
         
        <fieldset>
            <legend>Message Details</legend>
            
            <label for="subject">Subject:</label>
            <select id="subject" name="subject" required>
                <option value=">--Select a subject --</option>
                <option value="general">General Inquiry</option>
                <option value="Support">Support</option>
                <option value="feedback">Feedback</option>
            </select>
            <br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" placeholder="Option 1 (General Inquiry):I am reaching out to request more information about your services and how I can get started with you. "Option 2 (Support):I am experiencing an issue and would appreciate your help in resolvimg it as soon as possible."Option 3 (Feedback):I would like to share feedback about your website and suggest a few improvements for better user experience. "Option 4 (Siple and neutral):Hello,I would like to get in touch regarding your services and would appreciate a response when available.</textarea>
            <br><br>

        </fieldset>

        <fieldset>
            <legend>Preference</legend>

            <label>
                <input type="checkbox" name="newsletter" value="yes">
                Subscribe to newsletter
            </label>

        </fieldset>

        <br>
        <button type="submit">Submit</button>

    </form>

</body>
</html>
