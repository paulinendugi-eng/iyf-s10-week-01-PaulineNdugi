<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"content="width=device-width,initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>
   <h1>Contact Us</h1>

   <form action="#" method="post">

    <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Full Name</label>
        <input type="text" id="name"name="name" placeholder ="Pauline Ndugi">
        <br><br>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="paulinendugi@gmail.com">
        <br><br>

        <label for="phone">Phone(optional):</label>
        <input type="tel" id="phone" name="phone" placeholder=""Enter your phone number">
        <br><br>
    </fieldset>

    <fieldset>
        <legend><Message Details</legend>
        <label for="subject">Subject:</label>
        <select id="subject" name="subject" required>
            <option value="">--Select a subject--</option>
            <option value="general">General Inquiry</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
        </select>
        <br><br>

        <label for="message">Message:</label><br>
        <textarea id="message"name="message" rows="5" cols="40"placeholder="Write your message here..."></textarea>
        <br><br>
    </fieldset>

    <fieldset>
        <legend>Preference</legend>
        <label>
            <input type="checkbox"name="newsletter" value="yes">
            Subscribe to newsletter
        </label>
    </fieldset>
     
    <br>
    <button type="submit">Submit</button>
</form>

  <hr>

  <h2>Social Media</h2>
  <p>
    <a href="#">LinkedIn</a>
    <a href="#">GitHub</a>
    <a href="#">Twitter</a>
  </p>

  <h2>Location & Timezone</h2>
  <p>Nairobi,Kenya (EAT -UTC+3)</p>
</body>
</html>
